<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Counter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000">
<style>
@font-face {
  font-family: 'Press Start 2P';
  src: url('/PressStart2P-vaV7.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Press Start 2P', system-ui, monospace;
  cursor: pointer;
  user-select: none;
}
.counter-container {
  text-align: center;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#count {
  color: #fff;
  font-size: 18vw;
  font-weight: 400;
  line-height: 1;
  letter-spacing: 4px;
}
#reset {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.5);
  font-size: 16px;
  padding: 10px 22px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Press Start 2P', monospace;
}
#reset:hover {
  border-color: rgba(255,255,255,0.7);
  color: rgba(255,255,255,0.9);
}

/* Update popup - 16-bit style */
.update-popup {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 2px solid #fff;
  color: #fff;
  padding: 16px 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  text-align: center;
  display: none;
  z-index: 999;
  gap: 12px;
  align-items: center;
  image-rendering: pixelated;
  box-shadow: 0 0 0 2px #000, 0 0 0 4px #fff;
}
.update-popup.active { display: flex; }
.update-popup button {
  background: #fff;
  color: #000;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 8px 16px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.1s;
}
.update-popup button:hover { background: #ccc; }
.update-popup button.dismiss {
  background: transparent;
  color: #888;
  padding: 8px;
}
.update-popup button.dismiss:hover { color: #fff; }

@keyframes blink {
  50% { opacity: 0; }
}
.update-popup .badge {
  display: inline-block;
  background: #f0f;
  color: #000;
  padding: 4px 8px;
  font-size: 8px;
  animation: blink 1s step-end infinite;
}

/* Install popup - 16-bit style */
.install-popup {
  position: fixed;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 2px solid #0ff;
  color: #fff;
  padding: 16px 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  text-align: center;
  display: none;
  z-index: 999;
  gap: 12px;
  align-items: center;
  image-rendering: pixelated;
  box-shadow: 0 0 0 2px #000, 0 0 0 4px #0ff;
}
.install-popup.active { display: flex; }
.install-popup button {
  background: #0ff;
  color: #000;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 8px 16px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.1s;
}
.install-popup button:hover { background: #88ffff; }
.install-popup button.dismiss {
  background: transparent;
  color: #888;
  padding: 8px;
}
.install-popup button.dismiss:hover { color: #fff; }
.install-popup .badge {
  display: inline-block;
  background: #0ff;
  color: #000;
  padding: 4px 8px;
  font-size: 8px;
  animation: blink 1s step-end infinite;
}
</style>
</head>
<body>
<div class="counter-container" id="counterArea">
  <span id="count">0</span>
  <button id="reset">Reset</button>
  <div class="update-popup" id="updatePopup">
    <span class="badge">NEW</span>
    <span>Update available!</span>
    <button id="updateBtn">UPDATE</button>
    <button class="dismiss" id="dismissBtn">✕</button>
  </div>
  <div class="install-popup" id="installPopup">
    <span class="badge">INSTALL</span>
    <span>Install Pixel Counter?</span>
    <button id="installBtn">YES</button>
    <button class="dismiss" id="installDismiss">NAH</button>
  </div>
</div>
<script>
const countEl = document.getElementById('count');
let count = 0;

document.getElementById('counterArea').addEventListener('click', (e) => {
  if (e.target.id === 'reset') return;
  countEl.textContent = ++count;
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    countEl.textContent = ++count;
  }
});

document.getElementById('reset').addEventListener('click', (e) => {
  e.stopPropagation();
  count = 0;
  countEl.textContent = count;
});

// Service Worker registration with update popup
if ('serviceWorker' in navigator) {
  let swRegistration;

  navigator.serviceWorker.register('/sw.js').then((reg) => {
    swRegistration = reg;
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdatePopup();
        }
      });
    });
  });

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}

const popup = document.getElementById('updatePopup');
popup.addEventListener('click', (e) => e.stopPropagation());
document.getElementById('updateBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (swRegistration && swRegistration.waiting) {
    swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
  }
});
document.getElementById('dismissBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  popup.classList.remove('active');
});

function showUpdatePopup() {
  popup.classList.add('active');
}

// Install prompt
let deferredPrompt;
const installPopup = document.getElementById('installPopup');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installPopup.classList.add('active');
});

installPopup.addEventListener('click', (e) => e.stopPropagation());
document.getElementById('installBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  installPopup.classList.remove('active');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
});
document.getElementById('installDismiss').addEventListener('click', (e) => {
  e.stopPropagation();
  installPopup.classList.remove('active');
  deferredPrompt = null;
});
</script>
</body>
</html>
