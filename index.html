<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Counter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000">
<style>
@font-face {
  font-family: 'Press Start 2P';
  src: url('/PressStart2P-vaV7.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Press Start 2P', system-ui, monospace;
  cursor: pointer;
  user-select: none;
}
.counter-container {
  text-align: center;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
}
#count {
  color: #fff;
  font-size: 18vw;
  font-weight: 400;
  line-height: 1;
  letter-spacing: 4px;
}
#reset {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.5);
  font-size: 16px;
  padding: 10px 22px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Press Start 2P', monospace;
}
#reset:hover {
  border-color: rgba(255,255,255,0.7);
  color: rgba(255,255,255,0.9);
}

#vibToggle {
  position: fixed;
  bottom: 32px;
  left: 32px;
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.5);
  font-size: 16px;
  padding: 10px 22px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Press Start 2P', monospace;
  display: none;
}
#vibToggle:hover {
  border-color: rgba(255,255,255,0.7);
  color: rgba(255,255,255,0.9);
}
#vibToggle.on {
  border-color: rgba(0,255,136,0.5);
  color: rgba(0,255,136,0.7);
}
#vibToggle.on:hover {
  border-color: rgba(0,255,136,0.9);
  color: rgba(0,255,136,1);
}

/* Update popup - 16-bit style */
.update-popup {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 2px solid #fff;
  color: #fff;
  padding: 16px 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  text-align: center;
  display: none;
  z-index: 999;
  gap: 12px;
  align-items: center;
  image-rendering: pixelated;
  box-shadow: 0 0 0 2px #000, 0 0 0 4px #fff;
}
.update-popup.active { display: flex; }
.update-popup button {
  background: #fff;
  color: #000;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 8px 16px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.1s;
}
.update-popup button:hover { background: #ccc; }
.update-popup button.dismiss {
  background: transparent;
  color: #888;
  padding: 8px;
}
.update-popup button.dismiss:hover { color: #fff; }

@keyframes blink {
  50% { opacity: 0; }
}
.update-popup .badge {
  display: inline-block;
  background: #f0f;
  color: #000;
  padding: 4px 8px;
  font-size: 8px;
  animation: blink 1s step-end infinite;
}

/* Install popup - 16-bit style */
.install-popup {
  position: fixed;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 2px solid #0ff;
  color: #fff;
  padding: 16px 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  text-align: center;
  display: none;
  z-index: 999;
  gap: 12px;
  align-items: center;
  image-rendering: pixelated;
  box-shadow: 0 0 0 2px #000, 0 0 0 4px #0ff;
}
.install-popup.active { display: flex; }
.install-popup button {
  background: #0ff;
  color: #000;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 8px 16px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.1s;
}
.install-popup button:hover { background: #88ffff; }
.install-popup button.dismiss {
  background: transparent;
  color: #888;
  padding: 8px;
}
.install-popup button.dismiss:hover { color: #fff; }
.install-popup .badge {
  display: inline-block;
  background: #0ff;
  color: #000;
  padding: 4px 8px;
  font-size: 8px;
  animation: blink 1s step-end infinite;
}

/* Resume popup - 16-bit style */
.resume-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  border: 2px solid #ff0;
  color: #fff;
  padding: 24px 32px;
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  text-align: center;
  display: none;
  z-index: 1000;
  gap: 16px;
  align-items: center;
  image-rendering: pixelated;
  box-shadow: 0 0 0 2px #000, 0 0 0 4px #ff0;
  flex-direction: column;
  max-width: 90%;
}
.resume-popup.active { display: flex; }
.resume-popup .resume-count {
  font-size: 32px;
  color: #ff0;
  margin: 8px 0;
}
.resume-popup .resume-label {
  font-size: 10px;
  color: #888;
}
.resume-popup .resume-buttons {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}
.resume-popup button {
  background: #ff0;
  color: #000;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.1s;
}
.resume-popup button:hover { background: #fff; }
.resume-popup button.secondary {
  background: transparent;
  border: 1px solid #888;
  color: #888;
}
.resume-popup button.secondary:hover {
  border-color: #fff;
  color: #fff;
}
</style>
</head>
<body>
<div class="counter-container" id="counterArea">
  <span id="count">0</span>
  <button id="reset">Reset</button>
  <button id="vibToggle">VIB: OFF</button>
  <div class="update-popup" id="updatePopup">
    <span class="badge">NEW</span>
    <span>Update available!</span>
    <button id="updateBtn">UPDATE</button>
    <button class="dismiss" id="dismissBtn">✕</button>
  </div>
  <div class="install-popup" id="installPopup">
    <span class="badge">INSTALL</span>
    <span>Install Pixel Counter?</span>
    <button id="installBtn">YES</button>
    <button class="dismiss" id="installDismiss">NAH</button>
  </div>
  <div class="resume-popup" id="resumePopup">
    <span class="resume-label">PREVIOUS SESSION</span>
    <span class="resume-count" id="resumeCount">0</span>
    <span>Continue where you left off?</span>
    <div class="resume-buttons">
      <button id="resumeContinue">CONTINUE</button>
      <button class="secondary" id="resumeNew">FRESH START</button>
    </div>
  </div>
</div>
<script>
const STORAGE_KEY = 'pc-state';
const MAX_SESSIONS = 20;
const IDLE_DELAY = 5000;

const countEl = document.getElementById('count');
let count = 0;
let totalClicks = 0;
let sessionId = Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
let sessionStartedAt = Date.now();
let idleTimer = null;

const VIBRATION_KEY = 'pc-vibration';
let vibrationEnabled = false;
const vibToggleEl = document.getElementById('vibToggle');

function supportsVibration() {
  return 'vibrate' in navigator;
}

function vibrate(pattern) {
  if (vibrationEnabled && supportsVibration()) {
    try { navigator.vibrate(pattern); } catch {}
  }
}

function loadVibrationState() {
  try {
    const v = localStorage.getItem(VIBRATION_KEY);
    vibrationEnabled = v !== null ? v === 'true' : supportsVibration();
  } catch {
    vibrationEnabled = supportsVibration();
  }
  updateVibToggleUI();
}

function saveVibrationState() {
  try { localStorage.setItem(VIBRATION_KEY, String(vibrationEnabled)); } catch {}
}

function toggleVibration() {
  vibrationEnabled = !vibrationEnabled;
  saveVibrationState();
  updateVibToggleUI();
  if (vibrationEnabled) vibrate([30, 20, 30]);
}

function updateVibToggleUI() {
  if (!supportsVibration()) { vibToggleEl.style.display = 'none'; return; }
  vibToggleEl.style.display = 'block';
  vibToggleEl.textContent = vibrationEnabled ? 'VIB: ON' : 'VIB: OFF';
  vibToggleEl.classList.toggle('on', vibrationEnabled);
}

vibToggleEl.addEventListener('click', e => { e.stopPropagation(); toggleVibration(); });

console.log('[Pixel Counter] Vibration API supported:', supportsVibration());

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}

function saveState() {
  const state = loadState() || { sessions: [] };
  state.lastCount = count;
  const entry = { id: sessionId, startedAt: sessionStartedAt, endedAt: Date.now(), finalCount: count, totalClicks };
  state.lastSession = entry;
  const idx = state.sessions.findIndex(s => s.id === sessionId);
  if (idx >= 0) state.sessions[idx] = entry; else state.sessions.push(entry);
  if (state.sessions.length > MAX_SESSIONS) state.sessions = state.sessions.slice(-MAX_SESSIONS);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function resetIdle() { clearTimeout(idleTimer); idleTimer = setTimeout(saveState, IDLE_DELAY); }
function saveImmediate() { clearTimeout(idleTimer); saveState(); saveVibrationState(); }

function showResumePopup(n) {
  return new Promise(resolve => {
    const p = document.getElementById('resumePopup');
    document.getElementById('resumeCount').textContent = n;
    p.classList.add('active');
    document.getElementById('resumeContinue').onclick = e => { e.stopPropagation(); p.classList.remove('active'); resolve(true); };
    document.getElementById('resumeNew').onclick = e => { e.stopPropagation(); p.classList.remove('active'); resolve(false); };
  });
}

(async () => {
  loadVibrationState();
  const state = loadState();
  if (state && state.lastCount > 0) {
    if (await showResumePopup(state.lastCount)) {
      count = state.lastCount;
      totalClicks = state.lastSession?.totalClicks || 0;
      sessionId = state.lastSession?.id || sessionId;
      sessionStartedAt = state.lastSession?.startedAt || sessionStartedAt;
    }
  }
  countEl.textContent = count;

  document.getElementById('counterArea').addEventListener('click', e => {
    if (e.target.id === 'reset' || e.target.id === 'vibToggle' || e.target.closest('.resume-popup')) return;
    countEl.textContent = ++count;
    totalClicks++;
    vibrate(10);
    resetIdle();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      countEl.textContent = ++count;
      totalClicks++;
      vibrate(10);
      resetIdle();
    }
  });

  document.getElementById('reset').addEventListener('click', e => {
    e.stopPropagation();
    saveState();
    vibrate([50, 30, 50]);
    count = 0; totalClicks = 0;
    sessionId = Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
    sessionStartedAt = Date.now();
    countEl.textContent = count;
  });

  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') saveImmediate(); });
  window.addEventListener('pagehide', saveImmediate);
  window.addEventListener('beforeunload', saveImmediate);
})();

document.getElementById('resumePopup').addEventListener('click', e => e.stopPropagation());

let swRegistration;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then((reg) => {
    swRegistration = reg;
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdatePopup();
        }
      });
    });
  });

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}

const popup = document.getElementById('updatePopup');
popup.addEventListener('click', (e) => e.stopPropagation());
document.getElementById('updateBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  popup.classList.remove('active');
  if (swRegistration && swRegistration.waiting) {
    swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
  }
});
document.getElementById('dismissBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  popup.classList.remove('active');
});

function showUpdatePopup() {
  popup.classList.add('active');
}

let deferredPrompt;
const installPopup = document.getElementById('installPopup');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installPopup.classList.add('active');
});

installPopup.addEventListener('click', (e) => e.stopPropagation());
document.getElementById('installBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  installPopup.classList.remove('active');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
});
document.getElementById('installDismiss').addEventListener('click', (e) => {
  e.stopPropagation();
  installPopup.classList.remove('active');
  deferredPrompt = null;
});
</script>
</body>
</html>
